version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: financas-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: financas-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
